# ========================================
# SCARLET DEVIL NETWORK — ЯДРО УПРАВЛЕНИЯ 
# ========================================

parser:
  # = Максимальное количество профилей, забираемых с одного IP сервера =
  max_accounts_per_server: 5

system:
  # = Количество параллельных потоков для системных вызовов =
  threads: 25
  # = Юзер-агент для обхода базовой защиты источников =
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.0.0 Safari/537.36"

checking:
  # = Массив URL для тестирования HTTP 204.
  connectivity_urls:
    - "http://cp.cloudflare.com/generate_204"
    - "http://www.gstatic.com/generate_204"
    - "http://edge-http.microsoft.com/captiveportal/generate_204"
    - "http://connectivitycheck.gstatic.com/generate_204"
    
  # = URL для замера реальной скорости (1MB download для массового теста) =
  speedtest_url: "https://speed.cloudflare.com"
  # = URL для 10MB спидтеста Топ-5 Чемпионов =
  champion_test_url: "https://speed.cloudflare.com/__down?bytes=10485760"
  
  # = Минимальная скорость в Mbps. Используется как порог ранжирования; =
  # = узел отсеивается по ней ТОЛЬКО при speed_as_filter: true (см. AUDIT §2.4) =
  min_speed: 1.0
  # = Если true — min_speed работает как жёсткий фильтр отсева. =
  # = По умолчанию false: узел, прошедший L7-ping (204), выживает, =
  # = а скорость идёт только в сортировку/метки. =
  speed_as_filter: false
  # = Параллелизм скоростных тестов. Снижен с 40 для уменьшения =
  # = конкуренции за аплинк раннера и занижения скорости. =
  # = ВАЖНО: это ГЛОБАЛЬНЫЙ потолок одновременных загрузок — он не растёт =
  # = при увеличении l7_concurrency, поэтому аплинк не «душится». =
  speed_concurrency: 12
  # = Сколько батчей sing-box проверяются ПАРАЛЛЕЛЬНО на этапе L7. =
  # = Раньше батчи шли строго по очереди (166 шт. × ~20с = таймаут/отмена). =
  # = Каждый sing-box по-прежнему держит batch_size нод; параллелятся только =
  # = ожидания (большинство времени — ping-таймауты мёртвых нод). Трафик =
  # = ограничен глобально speed_concurrency, поэтому повышение безопасно. =
  l7_concurrency: 6
  # = Максимально допустимая задержка HTTP ответа =
  max_latency: 5000

app:
  # = Публичный URL дашборда =
  public_url: "https://scarlet-devil.vercel.app"
  template_path: "config/web/template.html"
  # = Тег канала для встраивания в имена узлов =
  channel_tag: "@ScDevNetwork"

whitelist:
  # = Ссылки на RAW-базы доменов ТСПУ и РКН (Обход Белых Списков) =
  domains_urls:
    - "https://raw.githubusercontent.com/whoahaow/rjsxrd/refs/heads/main/source/config/whitelist-all.txt"
    - "https://raw.githubusercontent.com/hxehex/russia-mobile-internet-whitelist/refs/heads/main/whitelist.txt"
  # = Ссылки на подсети (CIDR) =
  ips_urls:
    - "https://raw.githubusercontent.com/whoahaow/rjsxrd/refs/heads/main/source/config/cidrwhitelist.txt"
    - "https://raw.githubusercontent.com/hxehex/russia-mobile-internet-whitelist/refs/heads/main/cidrwhitelist.txt"

# = Размер батча для локального Sing-box =
BATCH_SIZE: 50
# = Количество топ-узлов для расширенного замера скорости (10MB чанк) =
# Снижено 20→5: каждый чемпион запускает отдельный sing-box (~35с), 20 чемпионов
# давали +700с к дрону и приводили к отмене по таймауту. 5 — баланс данных/времени.
CHAMPION_TOP_N: 5
