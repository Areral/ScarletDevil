# --- START OF FILE .github/workflows/update.yml ---
name: ⏣ Scarlet Devil Matrix Core

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

concurrency:
  group: deploy
  # Let an in-flight run finish instead of killing a mid-validation drone.
  # Overlapping runs queue rather than cancel (drones can take ~40+ min).
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  matrix-crawler:
    name: 🦇 Drone Matrix [${{ matrix.shard }}]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    
    steps:
      - name: ⭳ Initialize Repository
        uses: actions/checkout@v4

      - name: ⚙ Initialize Python 3.11 Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: ⚙ Initialize Golang Environment
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: false

      - name: ⛨ Install System Modules
        run: pip install -r requirements.txt

      - name: ☢ Deploy Sing-box Kernel
        id: singbox-cache
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/sing-box
          key: singbox-Linux-v1.12.23

      - name: ☢ Install Sing-box (if not cached)
        if: steps.singbox-cache.outputs.cache-hit != 'true'
        run: |
          wget -qO sing-box.tar.gz https://github.com/SagerNet/sing-box/releases/download/v1.12.23/sing-box-1.12.23-linux-amd64.tar.gz
          tar -xzf sing-box.tar.gz
          sudo cp sing-box-1.12.23-linux-amd64/sing-box /usr/local/bin/
          sudo chmod +x /usr/local/bin/sing-box
          rm -rf sing-box.tar.gz sing-box-1.12.23-linux-amd64

      - name: ⚡ Execute Shard Protocol
        env:
          SUBSCRIPTION_SOURCES: ${{ secrets.SUBSCRIPTION_SOURCES }}
          SHARD_INDEX: ${{ matrix.shard }}
          SHARD_COUNT: 4
          # RU_VERDICT_FILE (optional): path to a JSON list of node strict_ids that an
          # external RU probe worker confirmed reachable from inside Russia. When set, the
          # matching nodes are flagged ru_verified and emitted to sub_ru.txt. When unset,
          # sub_ru.txt is simply empty. To enable, add a step before this one that fetches
          # the worker's verdict (artifact/release/curl) and export RU_VERDICT_FILE here.
        run: python main.py

      - name: 📦 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shard-data-${{ matrix.shard }}
          path: |
            data/sub_*.txt
            data/stats_*.json
            data/source_health_*.json
            data/*.log
          retention-days: 1

  matrix-merge:
    name: 🩸 Nexus Merge
    needs: matrix-crawler
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: ⭳ Initialize Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙ Initialize Python 3.11 Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: ⛨ Install System Modules
        run: pip install -r requirements.txt

      - name: 📥 Download Shard Artifacts
        uses: actions/download-artifact@v4
        with:
          path: shards_temp

      - name: 🌐 Build HTML & Send Report
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TG_TOPIC_ID: ${{ secrets.TG_TOPIC_ID }}
        run: python merge.py

      - name: 🩻 Merge Source Health Files
        run: |
          python -c "
          import json, glob, os
          merged = {}
          for path in glob.glob('shards_temp/shard-data-*/source_health_*.json'):
              try:
                  with open(path) as f:
                      health = json.load(f)
                  for url, entry in health.items():
                      existing = merged.get(url, {})
                      # Keep the entry with the most recent last_check
                      if entry.get('last_check', 0) > existing.get('last_check', 0):
                          merged[url] = entry
                      elif url not in merged:
                          merged[url] = entry
              except Exception as exc:
                  print(f'WARN: failed to read {path}: {exc}')
          os.makedirs('data', exist_ok=True)
          with open('data/source_health.json', 'w') as f:
              json.dump(merged, f, indent=2)
          print(f'SourceHealth: merged {len(merged)} entries from multiple drones')
          "

      - name: ⭰ Sync & Deploy
        run: |
          git config --global user.name "Scarlet Devil Bot"
          git config --global user.email "bot@scarletdevil.net"

          # Stage only the artifacts that actually exist this run. A hard
          # `git add a b c` aborts with exit 1 if ANY path is missing (e.g.
          # sub_ru.txt when the RU probe is empty, or data/pool.json on the very
          # first run) — which previously crashed the whole merge job.
          PUBLISH_FILES="index.html sub_all.txt sub_bs.txt sub_chs.txt sub_ru.txt \
                  sub_vless.txt sub_vmess.txt sub_trojan.txt sub_ss.txt sub_hy2.txt \
                  data/source_health.json data/pool.json data/history.json"
          for f in $PUBLISH_FILES; do
            [ -f "$f" ] && git add "$f" || echo "skip (missing): $f"
          done

          if git diff --staged --quiet; then
            echo "No changes to publish."
            exit 0
          fi

          git commit -m "⏣ Scarlet Matrix Sync: $(date -u)"
          # Publish to main with a normal push (no --amend, no --force).
          # Rebase first in case a concurrent run advanced main.
          git pull --rebase origin main || true
          git push origin main
