<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" fill="none" role="img" aria-label="Scarlet Devil Network">
  <defs>
    <radialGradient id="g1" cx="16%" cy="18%" r="62%">
      <stop offset="0%" stop-color="#e11d2f" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#e11d2f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="90%" cy="14%" r="58%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="72%" cy="104%" r="64%">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0.55">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="46%" stop-color="#f9a8d4"/>
      <stop offset="100%" stop-color="#e0c594"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9a86a" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c9a86a" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#c9a86a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- void + atmospheric glows -->
  <rect width="1200" height="300" fill="#0a0507"/>
  <rect width="1200" height="300" fill="url(#g1)"/>
  <rect width="1200" height="300" fill="url(#g2)"/>
  <rect width="1200" height="300" fill="url(#g3)"/>

  <!-- kanji watermark -->
  <text x="1150" y="245" text-anchor="end" font-family="'Noto Serif JP','Yu Mincho','Hiragino Mincho ProN',serif"
        font-size="210" fill="none" stroke="#f472b6" stroke-opacity="0.12" stroke-width="2">紅魔郷</text>

  <!-- gold frame + corner ticks -->
  <rect x="14" y="14" width="1172" height="272" rx="10" fill="none" stroke="#c9a86a" stroke-opacity="0.28"/>
  <g stroke="#c9a86a" stroke-opacity="0.6" stroke-width="1.5">
    <path d="M30 30 h20 M30 30 v20"/>
    <path d="M1170 30 h-20 M1170 30 v20"/>
    <path d="M30 270 h20 M30 270 v-20"/>
    <path d="M1170 270 h-20 M1170 270 v-20"/>
  </g>

  <!-- status badge -->
  <circle cx="74" cy="70" r="5" fill="#34d399"/>
  <text x="88" y="75" font-family="'JetBrains Mono',Consolas,monospace" font-size="13" fill="#cdb9c4" letter-spacing="3">SCARLET MIST BARRIER · ACTIVE</text>

  <!-- wordmark -->
  <text x="60" y="155" font-family="'Trebuchet MS','Segoe UI',Arial,sans-serif" font-weight="800"
        font-size="80" fill="url(#title)" letter-spacing="-1.5">Scarlet Devil</text>
  <text x="64" y="210" font-family="'Trebuchet MS','Segoe UI',Arial,sans-serif" font-weight="800"
        font-size="40" fill="#ff3a52" letter-spacing="10">NETWORK</text>

  <!-- rule + tagline -->
  <rect x="64" y="230" width="430" height="2" fill="url(#rule)"/>
  <text x="64" y="256" font-family="'JetBrains Mono',Consolas,monospace" font-size="14" fill="#c9a86a" letter-spacing="2">
    SELF-VERIFYING PROXY AGGREGATOR · REALITY / HYSTERIA2 · DPI BYPASS</text>

  <!-- drifting sakura petals -->
  <g opacity="0.6">
    <path d="M0 8 C0 3 4 0 9 0 C9 5 5 9 0 9 Z" transform="translate(560 70) rotate(20) scale(1.6)" fill="#f9a8d4"/>
    <path d="M0 8 C0 3 4 0 9 0 C9 5 5 9 0 9 Z" transform="translate(700 120) rotate(-35) scale(1.2)" fill="#f472b6"/>
    <path d="M0 8 C0 3 4 0 9 0 C9 5 5 9 0 9 Z" transform="translate(880 200) rotate(60) scale(1.4)" fill="#f9a8d4"/>
    <path d="M0 8 C0 3 4 0 9 0 C9 5 5 9 0 9 Z" transform="translate(1020 90) rotate(10) scale(1.1)" fill="#f472b6"/>
    <path d="M0 8 C0 3 4 0 9 0 C9 5 5 9 0 9 Z" transform="translate(620 220) rotate(-15) scale(1.3)" fill="#f9a8d4"/>
  </g>
</svg>
